<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Radiator-III 480W RGB dimensions placeholder · production engineering drawing pending">
  <style>
    .bg { fill: #22262B; }
    .frame { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 1.2; stroke-dasharray: 6 6; }
    .body { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.55); stroke-width: 1.4; }
    .accent { fill: #F32740; }
    .rgb-r { fill: #F32740; }
    .rgb-g { fill: #3CB371; }
    .rgb-b { fill: #4A9FF5; }
    .label { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.85); font-weight: 700; }
    .sub { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.45); font-weight: 500; }
    .pending { font-family: 'JetBrains Mono', monospace; fill: #F32740; font-weight: 700; letter-spacing: 0.18em; }
    .dim-tick { stroke: rgba(255,255,255,0.7); stroke-width: 1; }
    .dim-text { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.8); font-size: 11px; }
  </style>
  <rect class="bg" x="0" y="0" width="800" height="520"/>
  <rect class="frame" x="20" y="20" width="760" height="480" rx="4"/>
  <!-- Front-face (round optic) with RGB triad sketched -->
  <circle class="body" cx="220" cy="260" r="120"/>
  <circle cx="200" cy="245" r="38" class="rgb-r" fill-opacity="0.55"/>
  <circle cx="240" cy="245" r="38" class="rgb-g" fill-opacity="0.55"/>
  <circle cx="220" cy="280" r="38" class="rgb-b" fill-opacity="0.55"/>
  <!-- Side profile on the right -->
  <rect class="body" x="430" y="180" width="260" height="160" rx="3"/>
  <g stroke="rgba(255,255,255,0.4)" stroke-width="0.8">
    <line x1="450" y1="180" x2="450" y2="160"/>
    <line x1="475" y1="180" x2="475" y2="160"/>
    <line x1="500" y1="180" x2="500" y2="160"/>
    <line x1="525" y1="180" x2="525" y2="160"/>
    <line x1="550" y1="180" x2="550" y2="160"/>
    <line x1="575" y1="180" x2="575" y2="160"/>
    <line x1="600" y1="180" x2="600" y2="160"/>
    <line x1="625" y1="180" x2="625" y2="160"/>
    <line x1="650" y1="180" x2="650" y2="160"/>
  </g>
  <rect class="body" x="500" y="340" width="120" height="30" rx="2"/>
  <circle class="accent" cx="560" cy="355" r="6"/>
  <text class="label" x="220" y="410" text-anchor="middle" font-size="13">FRONT &middot; RGB OPTIC</text>
  <text class="label" x="560" y="410" text-anchor="middle" font-size="13">SIDE</text>
  <text class="label" x="400" y="60" text-anchor="middle" font-size="16">Radiator-III &middot; LSPL480 · 480W RGB show<tspan fill="#F32740">Ⓐ</tspan>SYNC</text>
  <text class="sub" x="400" y="80" text-anchor="middle" font-size="11">Smallest envelope of the 3 sisters · 0.82 ft² EPA · shares R1 hardware</text>
  <text class="pending" x="400" y="475" text-anchor="middle" font-size="11">PRODUCTION DRAWING PENDING</text>
  <text class="sub" x="400" y="492" text-anchor="middle" font-size="9.5">Engineering will issue per-series dimensional drawings for R1 + R3</text>
</svg>
