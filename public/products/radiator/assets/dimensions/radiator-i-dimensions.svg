<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Radiator-I 850W dimensions placeholder · production engineering drawing pending">
  <style>
    .bg { fill: #22262B; }
    .frame { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 1.2; stroke-dasharray: 6 6; }
    .body { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.55); stroke-width: 1.4; }
    .accent { fill: #F32740; }
    .label { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.85); font-weight: 700; }
    .sub { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.45); font-weight: 500; }
    .pending { font-family: 'JetBrains Mono', monospace; fill: #F32740; font-weight: 700; letter-spacing: 0.18em; }
    .dim-tick { stroke: rgba(255,255,255,0.7); stroke-width: 1; }
    .dim-text { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.8); font-size: 11px; }
  </style>
  <rect class="bg" x="0" y="0" width="800" height="520"/>
  <rect class="frame" x="20" y="20" width="760" height="480" rx="4"/>
  <!-- Front-face (round optic) on the left -->
  <circle class="body" cx="220" cy="260" r="135"/>
  <circle cx="220" cy="260" r="100" fill="rgba(255,232,200,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <line x1="155" y1="260" x2="285" y2="260" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <line x1="220" y1="195" x2="220" y2="325" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <!-- Side profile on the right -->
  <rect class="body" x="430" y="180" width="280" height="170" rx="3"/>
  <!-- Fin lines on top -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="0.8">
    <line x1="450" y1="180" x2="450" y2="160"/>
    <line x1="475" y1="180" x2="475" y2="160"/>
    <line x1="500" y1="180" x2="500" y2="160"/>
    <line x1="525" y1="180" x2="525" y2="160"/>
    <line x1="550" y1="180" x2="550" y2="160"/>
    <line x1="575" y1="180" x2="575" y2="160"/>
    <line x1="600" y1="180" x2="600" y2="160"/>
    <line x1="625" y1="180" x2="625" y2="160"/>
    <line x1="650" y1="180" x2="650" y2="160"/>
    <line x1="675" y1="180" x2="675" y2="160"/>
  </g>
  <!-- Trunnion bracket below -->
  <rect class="body" x="510" y="350" width="120" height="30" rx="2"/>
  <circle class="accent" cx="570" cy="365" r="6"/>
  <!-- Dimension call-outs (placeholder) -->
  <g class="dim-tick">
    <line x1="80" y1="260" x2="115" y2="260"/>
    <line x1="80" y1="240" x2="80" y2="280"/>
    <line x1="115" y1="240" x2="115" y2="280"/>
  </g>
  <text class="dim-text" x="62" y="263" text-anchor="end">XX&quot;</text>
  <!-- Section labels -->
  <text class="label" x="220" y="430" text-anchor="middle" font-size="13">FRONT</text>
  <text class="label" x="570" y="430" text-anchor="middle" font-size="13">SIDE</text>
  <!-- Header and pending notice -->
  <text class="label" x="400" y="60" text-anchor="middle" font-size="16">Radiator-I &middot; LSPL850 · 850W</text>
  <text class="sub" x="400" y="80" text-anchor="middle" font-size="11">Optical envelope shared with Radiator-III · 1.24 ft² EPA</text>
  <text class="pending" x="400" y="475" text-anchor="middle" font-size="11">PRODUCTION DRAWING PENDING</text>
  <text class="sub" x="400" y="492" text-anchor="middle" font-size="9.5">Engineering will issue per-series dimensional drawings for R1 + R3</text>
</svg>
