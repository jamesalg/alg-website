<?xml version="1.0" encoding="UTF-8"?>
<!--
  PSB — Button Photocell Sensor
  =============================
  Small dome / puck with a transparent lens window in the center.
  Snaps into the Nightwatch sensor port (3-pin twist-lock or equivalent).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" role="img"
     aria-label="PSB Button Photocell Sensor">
  <defs>
    <radialGradient id="psbBody" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#3a3d41"/>
      <stop offset="0.7" stop-color="#27292c"/>
      <stop offset="1" stop-color="#1a1c1e"/>
    </radialGradient>
    <radialGradient id="psbLens" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#7a8087"/>
      <stop offset="0.6" stop-color="#4d525a"/>
      <stop offset="1" stop-color="#2c2f33"/>
    </radialGradient>
    <radialGradient id="psbHighlight" cx="0.35" cy="0.30" r="0.25">
      <stop offset="0" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="psbShadow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="rgba(0,0,0,0.32)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="370" rx="160" ry="20" fill="url(#psbShadow)"/>

  <!-- Photocell body — flat dome with rim -->
  <!-- Base ring (mounting flange) -->
  <ellipse cx="300" cy="320" rx="140" ry="36" fill="#202326" stroke="#0d0e0f" stroke-width="1.4"/>
  <ellipse cx="300" cy="316" rx="140" ry="36" fill="#2a2c2f" stroke="#0d0e0f" stroke-width="1.2"/>

  <!-- Body (cylindrical) -->
  <path d="M 160 316 L 160 220 A 140 60 0 0 1 440 220 L 440 316 Z"
        fill="url(#psbBody)" stroke="#0d0e0f" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Top dome -->
  <ellipse cx="300" cy="220" rx="140" ry="60" fill="#34373b" stroke="#0d0e0f" stroke-width="1.4"/>

  <!-- Inner lens window (the photocell itself) -->
  <ellipse cx="300" cy="218" rx="80" ry="34" fill="url(#psbLens)" stroke="#0d0e0f" stroke-width="1"/>

  <!-- Lens highlight (subtle white reflection top-left) -->
  <ellipse cx="270" cy="200" rx="36" ry="14" fill="url(#psbHighlight)"/>

  <!-- Crosshair indicator (sensor face) -->
  <line x1="288" y1="218" x2="312" y2="218" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="300" y1="208" x2="300" y2="228" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- 3-pin twist-lock prongs at bottom (NEMA 3-pin photocontrol mount) -->
  <rect x="245" y="350" width="10" height="22" rx="1.5" fill="#1a1c1e" stroke="#0d0e0f" stroke-width="0.8"/>
  <rect x="295" y="350" width="10" height="22" rx="1.5" fill="#1a1c1e" stroke="#0d0e0f" stroke-width="0.8"/>
  <rect x="345" y="350" width="10" height="22" rx="1.5" fill="#1a1c1e" stroke="#0d0e0f" stroke-width="0.8"/>

  <!-- Small "PHOTOCELL" label engraved on the body (subtle) -->
  <text x="300" y="270" text-anchor="middle"
        font-family="JetBrains Mono, monospace" font-size="11"
        letter-spacing="0.12em"
        fill="rgba(255,255,255,0.30)">PHOTOCELL</text>
</svg>
