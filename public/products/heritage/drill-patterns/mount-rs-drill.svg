<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="13">
  <!-- =============================================================================
       Heritage /RS · Round/Square Pole Bracket Drill Pattern
       Recreated from Heritage-I_C-Mount Drill Template.pdf (TYPE C · Arm mount)
       Layout matches the source CAD: BACK view of wall flange (top-left · slot
       hole pattern), FRONT-PROFILE view (top-middle · angled arm silhouette),
       END view (top-right · flat fixture-mount face), TOP/PLAN view
       (lower-left · arm in plan with center hole + slot), ISO REFERENCE (lower-right).
       Source dimensions preserved verbatim:
         140   mm [5.51"]  wall flange height (back view)
         162   mm [6.38"]  overall height of front profile (incl angled arm)
         202.2 mm [7.96"]  overall arm length (top view)
          85.7 mm [3.37"]  arm horizontal depth (end view)
       ============================================================================= -->

  <defs>
    <marker id="arrRS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2231A"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">TYPE C · Arm Mount</text>
  <text x="600" y="66" text-anchor="middle" font-size="12" fill="#666">Heritage-I  /  /RS  ·  LSBX-H1/RS  ·  3"/4"/5" round + square pole bracket</text>

  <!-- ============================================================================
       BACK VIEW (upper-left) · wall-side flange seen face-on
       Trapezoidal flange that bolts to the pole/wall. Shows two corner bolts
       and a vertical slot for cable pass-through.
       ============================================================================ -->
  <g transform="translate(80, 130)">
    <text x="80" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">BACK VIEW</text>

    <!-- Trapezoidal wall flange (narrower bottom) -->
    <path d="M 30 20 L 130 20 L 145 160 L 15 160 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Cable pass-through slot (vertical oval in middle) -->
    <rect x="72" y="50" width="16" height="60" rx="8" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>

    <!-- Top corner bolt -->
    <circle cx="80" cy="34" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="80" cy="34" r="1.5" fill="#1A1A1A"/>
    <!-- Bottom corner bolts -->
    <circle cx="35" cy="146" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="35" cy="146" r="1.5" fill="#1A1A1A"/>
    <circle cx="125" cy="146" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="125" cy="146" r="1.5" fill="#1A1A1A"/>

    <!-- Centerline -->
    <line x1="80" y1="0" x2="80" y2="180" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 140 mm [5.51"] — wall flange height -->
    <line x1="-30" y1="20" x2="-30" y2="160" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="-42" y="92" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -42 92)">140 mm  [5.51"]</text>
    <line x1="-33" y1="20" x2="30" y2="20" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-33" y1="160" x2="15" y2="160" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       FRONT PROFILE (upper-middle) · arm seen from the side
       L-shape: vertical wall flange on the right, angled arm extending forward
       and downward to the fixture mounting plate at the left.
       ============================================================================ -->
  <g transform="translate(380, 130)">
    <text x="160" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">FRONT PROFILE</text>

    <!-- Front profile silhouette -->
    <path d="M 280 0 L 280 200 L 240 200 L 30 60 L 30 30 L 50 30 L 280 0 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Top diagonal seam line (showing the arm's top edge) -->
    <line x1="50" y1="30" x2="240" y2="160" stroke="#1A1A1A" stroke-width="1.0" stroke-dasharray="3,2"/>

    <!-- Wall flange bolts (right edge) -->
    <circle cx="270" cy="20" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="270" cy="20" r="1.5" fill="#1A1A1A"/>
    <circle cx="270" cy="180" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="270" cy="180" r="1.5" fill="#1A1A1A"/>

    <!-- Fixture-mount face (left edge) bolts -->
    <circle cx="50" cy="42" r="3" fill="#1A1A1A"/>
    <circle cx="240" cy="190" r="3" fill="#1A1A1A"/>

    <!-- Dimension: 162 mm [6.38"] — overall height of profile -->
    <line x1="310" y1="0" x2="310" y2="200" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="324" y="100" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 324 100)">162 mm  [6.38"]</text>
    <line x1="280" y1="0" x2="313" y2="0" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="280" y1="200" x2="313" y2="200" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       END VIEW (upper-right) · fixture-mount face seen face-on
       Rectangular plate with center bolt + corner bolts for fixture attachment.
       ============================================================================ -->
  <g transform="translate(900, 130)">
    <text x="80" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">END VIEW</text>

    <!-- Rectangular fixture-mount face -->
    <rect x="20" y="20" width="140" height="160" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Slot in center -->
    <rect x="72" y="80" width="36" height="40" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>

    <!-- Corner bolts -->
    <circle cx="35" cy="35"  r="4" fill="#1A1A1A"/>
    <circle cx="145" cy="35" r="4" fill="#1A1A1A"/>
    <circle cx="35" cy="165" r="4" fill="#1A1A1A"/>
    <circle cx="145" cy="165" r="4" fill="#1A1A1A"/>

    <!-- Centerlines -->
    <line x1="90" y1="10" x2="90" y2="190" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="10" y1="100" x2="170" y2="100" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 85.7 mm [3.37"] — arm horizontal depth (width of end view) -->
    <line x1="20" y1="220" x2="160" y2="220" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="90" y="238" text-anchor="middle" fill="#E2231A" font-size="13">85.7 mm  [3.37"]</text>
    <line x1="20" y1="180" x2="20" y2="223" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="160" y1="180" x2="160" y2="223" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       TOP / PLAN VIEW (lower-left) · arm seen from above
       Rectangular plan of the arm with the wall flange on one end and the
       fixture-mount opening on the other.
       ============================================================================ -->
  <g transform="translate(80, 530)">
    <text x="200" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">TOP VIEW</text>

    <!-- Plan rectangle -->
    <rect x="20" y="40" width="360" height="100" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Center fixture-mount round hole (cable pass-through) -->
    <circle cx="190" cy="90" r="14" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>

    <!-- Two end bolts left (wall flange end) -->
    <circle cx="40" cy="56"  r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="40" cy="56"  r="1.5" fill="#1A1A1A"/>
    <circle cx="40" cy="124" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="40" cy="124" r="1.5" fill="#1A1A1A"/>

    <!-- Two end bolts right (fixture end) -->
    <circle cx="360" cy="56"  r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="360" cy="56"  r="1.5" fill="#1A1A1A"/>
    <circle cx="360" cy="124" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="360" cy="124" r="1.5" fill="#1A1A1A"/>

    <!-- Slot at fixture end (small rectangular cutout) -->
    <rect x="335" y="78" width="20" height="24" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>

    <!-- Centerlines -->
    <line x1="190" y1="76" x2="190" y2="104" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="176" y1="90" x2="204" y2="90" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="0" y1="90" x2="400" y2="90" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 202.2 mm [7.96"] — overall length -->
    <line x1="20" y1="180" x2="380" y2="180" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="200" y="198" text-anchor="middle" fill="#E2231A" font-size="13">202.2 mm  [7.96"]</text>
    <line x1="20" y1="140" x2="20" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="380" y1="140" x2="380" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       ISO REFERENCE (lower-right)
       3D representation of the L-shaped arm bracket.
       ============================================================================ -->
  <g transform="translate(680, 510)">
    <text x="200" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">ISO REFERENCE</text>

    <g stroke="#1A1A1A" stroke-width="1.4" fill="none" stroke-linejoin="round">
      <!-- Wall flange (vertical · right side) -->
      <path d="M 320 30 L 320 220 L 360 240 L 360 50 Z"/>
      <path d="M 320 30 L 280 50 L 280 240 L 320 220"/>
      <!-- Bolts on wall flange -->
      <circle cx="340" cy="65"  r="3" fill="#1A1A1A"/>
      <circle cx="340" cy="200" r="3" fill="#1A1A1A"/>

      <!-- Angled arm (from wall flange down/forward to fixture mount face) -->
      <!-- Top edge of arm -->
      <path d="M 280 50 L 80 200 L 60 215 L 260 65"/>
      <path d="M 280 50 L 260 65"/>
      <!-- Bottom edge of arm -->
      <path d="M 280 200 L 80 350"/>
      <path d="M 280 200 L 280 240 L 80 390 L 80 350"/>
      <!-- Side edge -->
      <path d="M 80 200 L 80 350 M 80 350 L 60 365"/>
      <!-- Front face -->
      <path d="M 80 200 L 60 215 L 60 365 L 80 350"/>

      <!-- Fixture mount plate (left end, vertical) -->
      <path d="M 60 215 L 30 232 L 30 382 L 60 365"/>
      <path d="M 30 232 L 30 382"/>

      <!-- Plate corner bolts -->
      <circle cx="48"  cy="240" r="3" fill="#1A1A1A"/>
      <circle cx="48"  cy="345" r="3" fill="#1A1A1A"/>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 838)">
    <text x="0" y="0" font-size="10" fill="#888">Source: Heritage-I_C-Mount Drill Template.pdf · TYPE C · Arm mount</text>
    <text x="0" y="14" font-size="10" fill="#888">All dimensions in mm with [inch] equivalent · centerlines + callouts in ⒶLG red · Heritage Install Guide is the authoritative install reference</text>
  </g>
</svg>
