<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="13">
  <!-- =============================================================================
       Heritage /UA · Universal Rotatable R/S Pole Mount Drill Pattern
       Recreated from Heritage-I_B-Mount Drill Template.pdf
       (TYPE B · Square/Round pole mount with slip-fitter function)
       Layout matches the source CAD: SIDE view (top-left · saddle bracket profile),
       DRILL PATTERN (top-right · wall flange face with bolt holes), END view of body
       (lower-left · cylindrical body + saddle), ISO REFERENCE (lower-right).
       Source dimensions preserved verbatim:
         247.4 mm [9.74"]  overall length (side view)
         162   mm [6.38"]  flange overall height (drill pattern)
         140   mm [5.51"]  bolt-hole vertical pitch (drill pattern)
          79.9 mm [3.15"]  flange profile height (lower view)
          58   mm [2.28"]  flange thickness segment
          90   mm [3.54"]  body length to flange
         Ø10   mm [Ø0.39"] bolt-hole diameter
         Ø40   mm [Ø1.57"] body cylindrical OD
       ============================================================================= -->

  <defs>
    <marker id="arrUA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2231A"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">TYPE B · Universal R/S Pole Mount</text>
  <text x="600" y="66" text-anchor="middle" font-size="12" fill="#666">Heritage-I  /  /UA  ·  LSBX-H1/UA  ·  square + round pole · slip-fitter function</text>

  <!-- ============================================================================
       SIDE VIEW (upper-left) · saddle bracket angled to flange
       Profile: angled triangular saddle on left, narrowing to a wall flange.
       Pivot disc visible inside the saddle.
       ============================================================================ -->
  <g transform="translate(80, 130)">
    <text x="220" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">SIDE VIEW</text>

    <!-- Triangular saddle profile + flange (right) -->
    <path d="M 30 80 L 50 30 L 200 30 L 280 110 L 280 160 L 30 160 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Wall flange (right vertical) -->
    <rect x="280" y="20" width="22" height="170" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Pivot disc inside saddle (large circle with indexing teeth) -->
    <circle cx="105" cy="90" r="42" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="105" cy="90" r="32" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>
    <circle cx="105" cy="90" r="3" fill="#1A1A1A"/>

    <!-- Indexing teeth around disc -->
    <g stroke="#1A1A1A" stroke-width="0.6">
      <line x1="105" y1="50" x2="105" y2="56"/>
      <line x1="125" y1="58" x2="121" y2="63"/>
      <line x1="140" y1="76" x2="135" y2="78"/>
      <line x1="146" y1="90" x2="139" y2="90"/>
      <line x1="140" y1="104" x2="135" y2="102"/>
      <line x1="125" y1="122" x2="121" y2="117"/>
      <line x1="105" y1="130" x2="105" y2="124"/>
      <line x1="85" y1="122" x2="89" y2="117"/>
      <line x1="70" y1="104" x2="75" y2="102"/>
      <line x1="64" y1="90" x2="71" y2="90"/>
      <line x1="70" y1="76" x2="75" y2="78"/>
      <line x1="85" y1="58" x2="89" y2="63"/>
    </g>

    <!-- Locking arrow indicator on disc -->
    <path d="M 105 50 L 95 58 L 115 58 Z" fill="#1A1A1A" stroke="none"/>

    <!-- Centerline through pivot -->
    <line x1="105" y1="20" x2="105" y2="170" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 247.4 mm [9.74"] — overall length -->
    <line x1="30" y1="200" x2="302" y2="200" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="166" y="218" text-anchor="middle" fill="#E2231A" font-size="13">247.4 mm  [9.74"]</text>
    <line x1="30" y1="160" x2="30" y2="203" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="302" y1="190" x2="302" y2="203" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       FLANGE DRILL PATTERN (upper-right) · the wall side bolt-hole pattern.
       Two through-holes vertically separated by 140 mm pitch on a 162 mm flange.
       ============================================================================ -->
  <g transform="translate(720, 130)">
    <text x="120" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">FLANGE DRILL PATTERN</text>

    <!-- Flange face (rectangular plate) -->
    <rect x="50" y="20" width="160" height="180" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Top hole + saddle clamp tab on top -->
    <rect x="100" y="0" width="60" height="20" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="130" cy="40" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="130" cy="40" r="1.5" fill="#1A1A1A"/>

    <!-- Bottom hole + saddle clamp tab on bottom -->
    <rect x="100" y="200" width="60" height="20" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="130" cy="180" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="130" cy="180" r="1.5" fill="#1A1A1A"/>

    <!-- Center body cutout (where the cylindrical body protrudes through) -->
    <rect x="80" y="80" width="100" height="60" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>

    <!-- Centerline vertical -->
    <line x1="130" y1="-10" x2="130" y2="230" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 140 mm [5.51"] — bolt pitch -->
    <line x1="20" y1="40" x2="20" y2="180" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="10" y="110" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 10 110)">140 mm  [5.51"]</text>
    <line x1="17" y1="40" x2="124" y2="40" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="17" y1="180" x2="124" y2="180" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 162 mm [6.38"] — flange overall height -->
    <line x1="240" y1="20" x2="240" y2="200" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="252" y="110" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 252 110)">162 mm  [6.38"]</text>
    <line x1="210" y1="20" x2="243" y2="20" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="210" y1="200" x2="243" y2="200" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Bolt-hole Ø callout -->
    <line x1="138" y1="36" x2="200" y2="-10" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="252" y="-14" text-anchor="middle" fill="#E2231A" font-size="13">Ø10 mm  [Ø0.39"]</text>
  </g>

  <!-- ============================================================================
       BODY / END VIEW (lower-left) · cylindrical body + flange profile end-on
       Shows the Ø40 cylindrical body, 90 mm body-to-flange length,
       58 mm flange thickness, 79.9 mm flange profile height.
       ============================================================================ -->
  <g transform="translate(80, 510)">
    <text x="220" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">BODY VIEW</text>

    <!-- Saddle (left) -->
    <path d="M 0 30 L 0 150 L 50 150 L 50 30 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <!-- Saddle bolt heads -->
    <circle cx="25" cy="50"  r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="25" cy="50"  r="1.5" fill="#1A1A1A"/>
    <circle cx="25" cy="130" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="25" cy="130" r="1.5" fill="#1A1A1A"/>

    <!-- Cylindrical body (rectangular profile from side) -->
    <rect x="50" y="60" width="200" height="60" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- End cap (right end · circular cap visible end-on) -->
    <circle cx="270" cy="90" r="22" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="270" cy="90" r="3" fill="#1A1A1A"/>

    <!-- Centerline -->
    <line x1="-10" y1="90" x2="305" y2="90" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 79.9 mm [3.15"] — overall flange profile height -->
    <line x1="-25" y1="30" x2="-25" y2="150" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="-37" y="90" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -37 90)">79.9 mm  [3.15"]</text>
    <line x1="-28" y1="30" x2="0" y2="30" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-28" y1="150" x2="0" y2="150" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 58 mm [2.28"] — flange thickness -->
    <line x1="0" y1="180" x2="50" y2="180" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="25" y="198" text-anchor="middle" fill="#E2231A" font-size="13">58 mm  [2.28"]</text>
    <line x1="0" y1="150" x2="0" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="50" y1="150" x2="50" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 90 mm [3.54"] — body length to flange -->
    <line x1="50" y1="180" x2="270" y2="180" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="160" y="198" text-anchor="middle" fill="#E2231A" font-size="13">90 mm  [3.54"]</text>
    <line x1="270" y1="115" x2="270" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Cylindrical body Ø callout -->
    <line x1="160" y1="60" x2="200" y2="0" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="262" y="-4" text-anchor="middle" fill="#E2231A" font-size="13">Ø40 mm  [Ø1.57"]</text>
  </g>

  <!-- ============================================================================
       ISO REFERENCE (lower-right)
       3D representation of the saddle bracket attached to a square/round pole
       with the cylindrical body extending outward.
       ============================================================================ -->
  <g transform="translate(720, 480)">
    <text x="180" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">ISO REFERENCE</text>

    <g stroke="#1A1A1A" stroke-width="1.4" fill="none" stroke-linejoin="round">
      <!-- Saddle bracket (angled) — front face -->
      <path d="M 30 130 L 60 50 L 200 30 L 230 110 L 230 200 L 30 200 Z"/>
      <!-- Top face -->
      <path d="M 60 50 L 120 30 L 200 30"/>
      <!-- Right edge to flange -->
      <path d="M 230 110 L 270 90 L 270 180 L 230 200"/>
      <path d="M 270 90 L 270 180"/>

      <!-- Cylindrical body extending out the back -->
      <ellipse cx="270" cy="135" rx="14" ry="22"/>
      <ellipse cx="345" cy="120" rx="14" ry="22"/>
      <line x1="270" y1="113" x2="345" y2="98"/>
      <line x1="270" y1="157" x2="345" y2="142"/>
      <ellipse cx="345" cy="120" rx="9" ry="15" stroke-dasharray="2,2"/>

      <!-- Pivot disc front face -->
      <circle cx="115" cy="130" r="38"/>
      <circle cx="115" cy="130" r="3" fill="#1A1A1A"/>
      <!-- Indexing teeth -->
      <g stroke-width="0.6">
        <line x1="115" y1="92" x2="115" y2="98"/>
        <line x1="138" y1="103" x2="134" y2="108"/>
        <line x1="153" y1="130" x2="147" y2="130"/>
        <line x1="138" y1="157" x2="134" y2="152"/>
        <line x1="115" y1="168" x2="115" y2="162"/>
        <line x1="92"  y1="157" x2="96"  y2="152"/>
        <line x1="77"  y1="130" x2="83"  y2="130"/>
        <line x1="92"  y1="103" x2="96"  y2="108"/>
      </g>

      <!-- Bolts on flange -->
      <circle cx="245" cy="50"  r="3" fill="#1A1A1A"/>
      <circle cx="245" cy="180" r="3" fill="#1A1A1A"/>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 838)">
    <text x="0" y="0" font-size="10" fill="#888">Source: Heritage-I_B-Mount Drill Template.pdf · TYPE B · Square/Round pole mount with slip-fitter function</text>
    <text x="0" y="14" font-size="10" fill="#888">All dimensions in mm with [inch] equivalent · centerlines + callouts in ⒶLG red · Heritage Install Guide is the authoritative install reference</text>
  </g>
</svg>
