<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="13">
  <!-- =============================================================================
       Heritage /SF · Slip-Fitter Drill Pattern + Envelope
       Recreated from Heritage-I_A-Mount Drill Template.pdf (TYPE A · Slip-fitter)
       Layout matches the source CAD: TOP view (top-left) · ISO (top-right) ·
       SIDE view (bottom-left) · END / TENON view (bottom-right).
       Brand colors: black (#1A1A1A) for product geometry · ALG red (#E2231A)
       for centerlines, dimension lines, callouts. White paper background.
       Source dimensions preserved verbatim:
         239.8 mm [9.44"]  overall length (TOP view)
          82   mm [3.23"]  overall height (SIDE view)
          82.9 mm [3.26"]  collar offset (END view)
         Ø62.2 mm [Ø2.45"] tenon ID (END view)
       ============================================================================= -->

  <defs>
    <marker id="arrSP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2231A"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">TYPE A · Slip-Fitter</text>
  <text x="600" y="66" text-anchor="middle" font-size="12" fill="#666">Heritage-I  /  /SF  ·  LSBX-H1/SF  ·  ⌀2-3/8" tenon (60.3 mm OD nominal)</text>

  <!-- ============================================================================
       TOP VIEW (upper-left) · plan-view of the slip-fitter bracket
       Body is a rectangular saddle with a circular pivot disc visible from above.
       ============================================================================ -->
  <g transform="translate(80, 130)">
    <text x="240" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">TOP VIEW</text>

    <!-- Mounting flange (left end · 2 bolt heads) -->
    <rect x="0" y="60" width="20" height="100" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <circle cx="10" cy="80"  r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="10" cy="80"  r="1.5" fill="#1A1A1A"/>
    <circle cx="10" cy="140" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="10" cy="140" r="1.5" fill="#1A1A1A"/>

    <!-- Body block (rectangular trough that holds the pivot disc) -->
    <path d="M 20 60 L 280 60 L 280 160 L 20 160 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Two parallel arms gripping the pivot disc (visible as inner lines) -->
    <line x1="120" y1="60" x2="120" y2="160" stroke="#1A1A1A" stroke-width="1.2"/>
    <line x1="270" y1="60" x2="270" y2="160" stroke="#1A1A1A" stroke-width="1.2"/>

    <!-- Pivot disc (slip-fitter collar) viewed from above -->
    <circle cx="195" cy="110" r="46" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <circle cx="195" cy="110" r="34" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>
    <circle cx="195" cy="110" r="3"  fill="#1A1A1A"/>

    <!-- Indexing notches around disc -->
    <g stroke="#1A1A1A" stroke-width="0.6">
      <line x1="195" y1="64" x2="195" y2="69"/>
      <line x1="237" y1="91" x2="232" y2="93"/>
      <line x1="237" y1="129" x2="232" y2="127"/>
      <line x1="195" y1="156" x2="195" y2="151"/>
      <line x1="153" y1="129" x2="158" y2="127"/>
      <line x1="153" y1="91" x2="158" y2="93"/>
    </g>

    <!-- Slip-fitter saddle clamp opening on the right end -->
    <path d="M 280 80 L 320 80 L 320 70 L 360 70 L 360 150 L 320 150 L 320 140 L 280 140" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <line x1="320" y1="80" x2="320" y2="140" stroke="#1A1A1A" stroke-width="1.0" stroke-dasharray="3,2"/>

    <!-- Saddle bolts (two visible) -->
    <circle cx="345" cy="92" r="3" fill="#1A1A1A"/>
    <circle cx="345" cy="128" r="3" fill="#1A1A1A"/>

    <!-- Centerline through pivot disc -->
    <line x1="195" y1="50" x2="195" y2="170" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 239.8 mm [9.44"] — overall length -->
    <line x1="0" y1="200" x2="360" y2="200" stroke="#E2231A" stroke-width="1" marker-start="url(#arrSP)" marker-end="url(#arrSP)"/>
    <text x="180" y="218" text-anchor="middle" fill="#E2231A" font-size="13">239.8 mm  [9.44"]</text>
    <line x1="0" y1="160" x2="0" y2="203" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="360" y1="150" x2="360" y2="203" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       ISO REFERENCE (upper-right)
       3D wireframe of the slip-fitter bracket showing the body, the pivot disc
       with indexing teeth, and the saddle-clamp slip-fitter on the far end.
       ============================================================================ -->
  <g transform="translate(700, 110)">
    <text x="180" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">ISO REFERENCE</text>

    <g stroke="#1A1A1A" stroke-width="1.4" fill="none" stroke-linejoin="round">
      <!-- Mounting flange (left, vertical) -->
      <path d="M 30 60 L 30 175 L 50 195 L 50 80 Z"/>
      <circle cx="40" cy="95"  r="3"/>
      <circle cx="40" cy="160" r="3"/>

      <!-- Long body — front face -->
      <path d="M 50 80 L 50 195 L 235 195 L 235 80 Z"/>
      <!-- Top face -->
      <path d="M 50 80 L 80 50 L 265 50 L 235 80 Z"/>
      <!-- Right face -->
      <path d="M 235 80 L 265 50 L 265 165 L 235 195 Z"/>

      <!-- Pivot disc set into body (front) -->
      <ellipse cx="142" cy="138" rx="50" ry="50"/>
      <ellipse cx="142" cy="138" rx="38" ry="38"/>
      <circle cx="142" cy="138" r="4" fill="#1A1A1A"/>
      <!-- Indexing teeth around disc -->
      <g stroke-width="0.7">
        <line x1="142" y1="92" x2="142" y2="98"/>
        <line x1="173" y1="106" x2="168" y2="111"/>
        <line x1="188" y1="138" x2="182" y2="138"/>
        <line x1="173" y1="170" x2="168" y2="165"/>
        <line x1="142" y1="184" x2="142" y2="178"/>
        <line x1="111" y1="170" x2="116" y2="165"/>
        <line x1="96" y1="138" x2="102" y2="138"/>
        <line x1="111" y1="106" x2="116" y2="111"/>
      </g>

      <!-- Saddle-clamp slip-fitter on right end -->
      <path d="M 265 100 L 305 100 L 305 75 L 340 75 L 340 165 L 305 165 L 305 145 L 265 145"/>
      <!-- Inner tenon hole (dashed) -->
      <ellipse cx="322" cy="120" rx="14" ry="22" stroke-dasharray="2,2"/>
      <!-- Bolts on saddle -->
      <circle cx="320" cy="88"  r="2.5" fill="#1A1A1A"/>
      <circle cx="320" cy="152" r="2.5" fill="#1A1A1A"/>

      <!-- Direction arrow (slight aim indicator on body top) -->
      <path d="M 100 60 L 130 60 L 125 56 M 130 60 L 125 64" stroke-width="1.0"/>
    </g>
  </g>

  <!-- ============================================================================
       SIDE VIEW (lower-left)
       Side profile of the bracket body showing pivot mechanism + height.
       ============================================================================ -->
  <g transform="translate(80, 510)">
    <text x="240" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">SIDE VIEW</text>

    <!-- Mounting flange (left end) -->
    <rect x="0" y="20" width="20" height="100" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <circle cx="10" cy="40"  r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="10" cy="40"  r="1.5" fill="#1A1A1A"/>
    <circle cx="10" cy="100" r="4" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="10" cy="100" r="1.5" fill="#1A1A1A"/>

    <!-- Body — rectangular profile -->
    <rect x="20" y="20" width="260" height="100" rx="3" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Pivot disc visible edge-on (vertical slot) -->
    <line x1="195" y1="20" x2="195" y2="120" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="3,2"/>
    <rect x="187" y="40" width="16" height="60" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>

    <!-- Saddle-clamp slip-fitter end -->
    <path d="M 280 35 L 320 35 L 320 22 L 360 22 L 360 118 L 320 118 L 320 105 L 280 105" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <line x1="320" y1="22" x2="320" y2="118" stroke="#1A1A1A" stroke-width="1.0" stroke-dasharray="3,2"/>
    <circle cx="345" cy="48"  r="3" fill="#1A1A1A"/>
    <circle cx="345" cy="92" r="3" fill="#1A1A1A"/>

    <!-- Centerline horizontal -->
    <line x1="-10" y1="70" x2="370" y2="70" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 82 mm [3.23"] — overall height -->
    <line x1="-30" y1="20" x2="-30" y2="120" stroke="#E2231A" stroke-width="1" marker-start="url(#arrSP)" marker-end="url(#arrSP)"/>
    <text x="-42" y="74" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -42 74)">82 mm  [3.23"]</text>
    <line x1="-33" y1="20" x2="0" y2="20" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-33" y1="120" x2="0" y2="120" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       END / TENON VIEW (lower-right)
       Looking down the tenon axis. Shows the saddle-clamp profile + tenon ID.
       ============================================================================ -->
  <g transform="translate(700, 530)">
    <text x="180" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">END VIEW · TENON</text>

    <!-- Saddle-clamp profile (hexagonal-ish two-piece collar) -->
    <path d="M 100 50 L 260 50 L 260 80 L 240 80 L 240 220 L 260 220 L 260 250 L 100 250 L 100 220 L 120 220 L 120 80 L 100 80 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Bolt heads on saddle -->
    <circle cx="80" cy="90" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="80" cy="90" r="2" fill="#1A1A1A"/>
    <circle cx="80" cy="210" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="80" cy="210" r="2" fill="#1A1A1A"/>
    <circle cx="280" cy="90" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="280" cy="90" r="2" fill="#1A1A1A"/>
    <circle cx="280" cy="210" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="280" cy="210" r="2" fill="#1A1A1A"/>

    <!-- Tenon ID (Ø62.2 mm) -->
    <circle cx="180" cy="150" r="60" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <!-- Indexing notches inside the collar (showing slip-fitter teeth) -->
    <g stroke="#1A1A1A" stroke-width="0.6">
      <line x1="180" y1="90"  x2="180" y2="98"/>
      <line x1="221" y1="109" x2="215" y2="115"/>
      <line x1="240" y1="150" x2="232" y2="150"/>
      <line x1="221" y1="191" x2="215" y2="185"/>
      <line x1="180" y1="210" x2="180" y2="202"/>
      <line x1="139" y1="191" x2="145" y2="185"/>
      <line x1="120" y1="150" x2="128" y2="150"/>
      <line x1="139" y1="109" x2="145" y2="115"/>
    </g>

    <!-- Centerlines through tenon -->
    <line x1="180" y1="40" x2="180" y2="260" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="70" y1="150" x2="290" y2="150" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: Ø62.2 mm [Ø2.45"] — tenon ID -->
    <line x1="190" y1="160" x2="320" y2="280" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrSP)"/>
    <text x="378" y="288" text-anchor="middle" fill="#E2231A" font-size="13">Ø62.2 mm  [Ø2.45"]</text>

    <!-- Dimension: 82.9 mm [3.26"] — collar offset width (top of view) -->
    <line x1="100" y1="20" x2="260" y2="20" stroke="#E2231A" stroke-width="1" marker-start="url(#arrSP)" marker-end="url(#arrSP)"/>
    <text x="180" y="12" text-anchor="middle" fill="#E2231A" font-size="13">82.9 mm  [3.26"]</text>
    <line x1="100" y1="50" x2="100" y2="17" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="260" y1="50" x2="260" y2="17" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 838)">
    <text x="0" y="0" font-size="10" fill="#888">Source: Heritage-I_A-Mount Drill Template.pdf · TYPE A · Slip-fitter (chrome 2-3/8" tenon)</text>
    <text x="0" y="14" font-size="10" fill="#888">All dimensions in mm with [inch] equivalent · centerlines + callouts in ⒶLG red · Heritage Install Guide is the authoritative install reference</text>
  </g>
</svg>
