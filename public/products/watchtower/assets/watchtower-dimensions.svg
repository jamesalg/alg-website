<?xml version="1.0" encoding="UTF-8"?>
<!--
  Watchtower (LWPC | Watchtower-I) — Sizing & Measurements
  ========================================================
  Two-view technical drawing matching the datasheet page 4 sizing diagram:
    • Front view (left)  — 14.24" W × 9.27" H
    • Side  view (right) — 7.38" D × 9.27" H, showing the angled full-cutoff top
  All measurements in inches, dual-stamped with millimetres in brackets where
  the datasheet shows both. Both LWPC3W80 and LWPC3W120 share the same
  envelope; only the internal driver compartment depth differs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360"
     role="img" aria-label="Watchtower dimensions — front view 14.24 in wide, side view 7.38 in deep × 9.27 in tall">

  <defs>
    <style>
      .body  { fill: #2c2f33; stroke: #cfd2d6; stroke-width: 1.6; stroke-linejoin: round; }
      .face  { fill: #34373b; stroke: #cfd2d6; stroke-width: 1.4; stroke-linejoin: round; }
      .lens  { fill: #4d525a; stroke: #cfd2d6; stroke-width: 1; }
      .led   { fill: #6c7178; }
      .dim   { stroke: #cfd2d6; stroke-width: 0.8; fill: none; }
      .dim-arrow { fill: #cfd2d6; }
      .dim-label { font-family: 'Lato', system-ui, sans-serif; font-size: 11px; fill: #cfd2d6; }
      .dim-mm    { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: rgba(207,210,214,0.65); }
      .view-label { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.18em; fill: #cfd2d6; text-transform: uppercase; }
    </style>
  </defs>

  <!-- ==============  FRONT VIEW  ============== -->
  <!--
    Front face: rectangular housing 14.24" (W) × 9.27" (H).
    Inset prismatic lens runs nearly full width, anchored near the bottom
    of the front face (the LED bar shown behind the polycarbonate prismatic).
  -->
  <g transform="translate(40, 60)">
    <!-- Outer body silhouette -->
    <rect class="body" x="0" y="0" width="280" height="180" rx="3" />
    <!-- Front face inset -->
    <rect class="face" x="6" y="6" width="268" height="168" rx="2" />
    <!-- Prismatic lens band -->
    <rect class="lens" x="22" y="118" width="236" height="38" rx="1" />
    <!-- LED chip array (5 dot pairs hint at the strip) -->
    <g class="led">
      <circle cx="55"  cy="137" r="2.2" />
      <circle cx="95"  cy="137" r="2.2" />
      <circle cx="140" cy="137" r="2.2" />
      <circle cx="185" cy="137" r="2.2" />
      <circle cx="225" cy="137" r="2.2" />
    </g>
    <!-- Mounting screw indicators (corners) -->
    <circle class="lens" cx="14" cy="14" r="2.4" />
    <circle class="lens" cx="266" cy="14" r="2.4" />
    <circle class="lens" cx="14" cy="166" r="2.4" />
    <circle class="lens" cx="266" cy="166" r="2.4" />

    <!-- Width dimension (top) -->
    <line class="dim" x1="0" y1="-18" x2="280" y2="-18" />
    <line class="dim" x1="0" y1="-22" x2="0" y2="-12" />
    <line class="dim" x1="280" y1="-22" x2="280" y2="-12" />
    <polygon class="dim-arrow" points="0,-18 6,-21 6,-15" />
    <polygon class="dim-arrow" points="280,-18 274,-21 274,-15" />
    <text class="dim-label" x="140" y="-22" text-anchor="middle">14.24"</text>
    <text class="dim-mm"    x="140" y="-7"  text-anchor="middle">[361.0 mm]</text>

    <!-- Height dimension (left) -->
    <line class="dim" x1="-18" y1="0" x2="-18" y2="180" />
    <line class="dim" x1="-22" y1="0" x2="-12" y2="0" />
    <line class="dim" x1="-22" y1="180" x2="-12" y2="180" />
    <polygon class="dim-arrow" points="-18,0 -21,6 -15,6" />
    <polygon class="dim-arrow" points="-18,180 -21,174 -15,174" />
    <text class="dim-label" x="-26" y="93" text-anchor="end">9.27"</text>
    <text class="dim-mm"    x="-26" y="105" text-anchor="end">[235.5]</text>

    <!-- View label -->
    <text class="view-label" x="140" y="206" text-anchor="middle">Front View</text>
  </g>

  <!-- ==============  SIDE VIEW  ============== -->
  <!--
    Side profile reveals the full-cutoff geometry:
      • Vertical mounting back panel (full 9.27" tall)
      • Top face slopes from full height at rear, down to ~3.7" front face
      • This angled top is what gives the fixture zero uplight
      • Lens is mounted on the bottom of the front face, projects light forward + down
  -->
  <g transform="translate(420, 60)">
    <!-- Side profile silhouette (full-cutoff wedge):
         (0,0) top-rear corner → (200,90) top-front corner → (200,180) bottom-front
         → (0,180) bottom-rear → close.
         Mounting plate flange extends slightly behind (-10 to 0). -->
    <!-- Mounting flange (rear) -->
    <rect class="body" x="-12" y="0" width="12" height="180" />

    <!-- Main body wedge -->
    <polygon class="body"
             points="0,0 200,90 200,180 0,180" />
    <!-- Subtle highlight on the angled top face -->
    <polygon class="face"
             points="2,2 198,90 200,93 2,4" />

    <!-- Lens on the bottom-front face -->
    <rect class="lens" x="186" y="120" width="14" height="50" rx="1" />

    <!-- Mounting screws (rear flange) -->
    <circle class="lens" cx="-6" cy="40"  r="2.4" />
    <circle class="lens" cx="-6" cy="140" r="2.4" />

    <!-- Total depth dimension (top) -->
    <line class="dim" x1="-12" y1="-18" x2="200" y2="-18" />
    <line class="dim" x1="-12" y1="-22" x2="-12" y2="-12" />
    <line class="dim" x1="200" y1="-22" x2="200" y2="-12" />
    <polygon class="dim-arrow" points="-12,-18 -6,-21 -6,-15" />
    <polygon class="dim-arrow" points="200,-18 194,-21 194,-15" />
    <text class="dim-label" x="94" y="-22" text-anchor="middle">7.38"</text>
    <text class="dim-mm"    x="94" y="-7"  text-anchor="middle">[187.4 mm]</text>

    <!-- Total height dimension (right side) -->
    <line class="dim" x1="218" y1="0" x2="218" y2="180" />
    <line class="dim" x1="214" y1="0" x2="222" y2="0" />
    <line class="dim" x1="214" y1="180" x2="222" y2="180" />
    <polygon class="dim-arrow" points="218,0 215,6 221,6" />
    <polygon class="dim-arrow" points="218,180 215,174 221,174" />
    <text class="dim-label" x="226" y="93">9.27"</text>
    <text class="dim-mm"    x="226" y="105">[235.5]</text>

    <!-- Inset measurements (rear height callouts from datasheet: 13.1 / 10.9 / 3.7) -->
    <!-- Rear-back-height (full mounting plate): 13.1 — ghost line -->
    <text class="dim-mm" x="-22" y="50" text-anchor="end">13.1</text>
    <text class="dim-mm" x="-22" y="62" text-anchor="end">tall</text>

    <!-- Front-face height (below angled top, where lens sits): 3.7 -->
    <line class="dim" x1="208" y1="120" x2="208" y2="170" />
    <line class="dim" x1="204" y1="120" x2="212" y2="120" />
    <line class="dim" x1="204" y1="170" x2="212" y2="170" />
    <text class="dim-mm" x="214" y="148">3.7"</text>

    <!-- View label -->
    <text class="view-label" x="100" y="206" text-anchor="middle">Side View · Full-Cutoff Profile</text>
  </g>

  <!-- ==============  TITLE STRIP  ============== -->
  <text class="view-label" x="350" y="40" text-anchor="middle"
        style="font-size: 11px; letter-spacing: 0.22em;">
    LWPC3W80 + LWPC3W120 · Sizing &amp; Measurements (in)
  </text>

  <!--
    Note: dimensions are identical between LWPC3W80 (40/60/80W class) and
    LWPC3W120 (80/100/120W class) — the housing is shared. Only internal
    driver compartment / LED count differs between the two model classes.
  -->
  <text class="dim-mm" x="350" y="338" text-anchor="middle"
        style="font-size: 8.5px; letter-spacing: 0.05em;">
    Both LWPC3W80 and LWPC3W120 share the same housing envelope. Reference: Datasheet p.4 · Sizing &amp; Measurements.
  </text>
</svg>
