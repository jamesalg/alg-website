<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" font-family="JetBrains Mono, monospace">
  <rect width="600" height="600" fill="#1c2025"/>
  <g transform="translate(300,300)">
    <!-- Polar grid: 8 spokes + 4 concentric circles -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="0.8" fill="none">
      <circle r="60"/><circle r="120"/><circle r="180"/><circle r="240"/>
      <line x1="-260" y1="0" x2="260" y2="0"/>
      <line x1="0" y1="-260" x2="0" y2="260"/>
      <line x1="-184" y1="-184" x2="184" y2="184"/>
      <line x1="184" y1="-184" x2="-184" y2="184"/>
    </g>
    <!-- NEMA 5 wide-flood envelope (illustrative) -->
    <path d="M -190 0 Q -180 -120 -90 -200 Q 0 -240 90 -200 Q 180 -120 190 0 Q 180 30 0 60 Q -180 30 -190 0 Z" fill="rgba(243,39,64,0.18)" stroke="rgba(243,39,64,0.7)" stroke-width="1.5"/>
    <text x="0" y="-260" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">0°</text>
    <text x="270" y="5" fill="rgba(255,255,255,0.5)" font-size="12">90°</text>
    <text x="0" y="280" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">180°</text>
    <text x="-280" y="5" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="12">270°</text>
  </g>
  <text x="300" y="40" text-anchor="middle" fill="#F32740" font-size="13" font-weight="700" letter-spacing="2">PLACEHOLDER POLAR PLOT</text>
  <text x="300" y="62" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">NEMA 5 wide-flood envelope · per-cell LM-79 plots ship from /assets/everest/polar/</text>
  <text x="300" y="568" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">36 per-W per-CCT polar SVGs already rendered · wired by Section 7 toggle</text>
</svg>
