<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="13">
  <!-- =============================================================================
       Liberty /TN · Trunnion / Wall Yoke Drill Pattern + Envelope
       Recreated from Liberty FM Bracket Dimension & Drilling Pattern.pdf
       (SNC OEM · part 1.020416.0180073 · SB20 · 3mm cold-rolled steel · 0.83kg)
       Layout matches the source CAD: U-BRACKET FRONT (top-left · saddle U
       silhouette), END VIEW (top-right · trunnion ear pivot), DEVELOPED
       FLAT (lower · 4-hole drill pattern showing 50mm spacing), ISO REFERENCE
       (lower-right).
       Source dimensions preserved verbatim:
         300    mm  overall U-bracket width (outer)
        *272±2  mm  bolt-pitch between two saddle arms (inner)
        *217±2  mm  saddle arm height
         725.26 mm  developed (unfolded) flat strap length
          52    mm  saddle strap width
          50    mm  drill-hole spacing (×4 holes on bottom strap)
          Ø40   mm  trunnion ear OD (pivot disc · die-cast end caps)
          Ø9    mm  trunnion pivot through-hole
          Ø5.5  mm  fixture-attachment hole
          Ø21.5 mm  large center hole on bottom strap (cable / pole pass-through)
          Ø13   mm  3× mounting through-holes on bottom strap
       ============================================================================= -->

  <defs>
    <marker id="arrTN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2231A"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">FM Bracket · Trunnion / Wall Yoke</text>
  <text x="600" y="66" text-anchor="middle" font-size="12" fill="#666">Liberty  /  /TN  ·  LSBX-L1/TN  ·  3 mm cold-rolled steel  ·  0.83 kg  ·  SB20 chassis  ·  ±60° trunnion pivot</text>

  <!-- ============================================================================
       U-BRACKET FRONT VIEW (upper-left) · saddle U silhouette with end caps
       Two vertical saddle arms · bottom strap connects them
       ============================================================================ -->
  <g transform="translate(80, 130)">
    <text x="200" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">FRONT VIEW · U-BRACKET</text>

    <!-- U-bracket silhouette (inverted U with rounded inside corners) -->
    <path d="M 30 240 L 30 60 Q 30 30 60 30 L 340 30 Q 370 30 370 60 L 370 240" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Bottom strap (horizontal across the bottom) -->
    <rect x="20" y="240" width="360" height="40" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Left + right trunnion ear caps (Ø40 die-cast) -->
    <circle cx="35" cy="155" r="22" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="35" cy="155" r="6" fill="#1A1A1A"/>
    <circle cx="365" cy="155" r="22" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="365" cy="155" r="6" fill="#1A1A1A"/>

    <!-- Indexing notches on trunnion ears -->
    <g stroke="#1A1A1A" stroke-width="0.6">
      <line x1="35" y1="135" x2="35" y2="140"/>
      <line x1="55" y1="155" x2="50" y2="155"/>
      <line x1="35" y1="175" x2="35" y2="170"/>
      <line x1="15" y1="155" x2="20" y2="155"/>
      <line x1="365" y1="135" x2="365" y2="140"/>
      <line x1="385" y1="155" x2="380" y2="155"/>
      <line x1="365" y1="175" x2="365" y2="170"/>
      <line x1="345" y1="155" x2="350" y2="155"/>
    </g>

    <!-- Centerlines -->
    <line x1="200" y1="0" x2="200" y2="290" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="0" y1="155" x2="400" y2="155" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 300 mm outer width -->
    <line x1="20" y1="310" x2="380" y2="310" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="200" y="328" text-anchor="middle" fill="#E2231A" font-size="13">300 mm  [11.81"]</text>
    <line x1="20" y1="280" x2="20" y2="313" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="380" y1="280" x2="380" y2="313" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: *272±2 mm bolt-pitch between saddle arms -->
    <line x1="60" y1="0" x2="340" y2="0" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="200" y="-8" text-anchor="middle" fill="#E2231A" font-size="13">*272±2 mm  [10.71"] · saddle inner pitch</text>

    <!-- Dimension: *217±2 mm saddle height -->
    <line x1="-15" y1="30" x2="-15" y2="240" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="-26" y="138" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -26 138)">*217±2 mm  [8.54"]</text>
    <line x1="-18" y1="30" x2="30" y2="30" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-18" y1="240" x2="30" y2="240" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- 52mm strap width callout -->
    <line x1="380" y1="240" x2="430" y2="280" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrTN)"/>
    <text x="445" y="284" text-anchor="middle" fill="#E2231A" font-size="11">52 mm strap</text>
  </g>

  <!-- ============================================================================
       END VIEW (upper-right) · trunnion ear pivot detail
       Shows the Ø40 die-cast end cap with Ø9 + Ø5.5 hole pattern
       ============================================================================ -->
  <g transform="translate(700, 130)">
    <text x="160" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">END VIEW · TRUNNION EAR PIVOT</text>

    <!-- End-cap die-cast disc -->
    <circle cx="160" cy="140" r="80" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>
    <circle cx="160" cy="140" r="60" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>

    <!-- Ø9 trunnion pivot bolt (center) -->
    <circle cx="160" cy="140" r="10" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="160" cy="140" r="3" fill="#1A1A1A"/>

    <!-- Ø5.5 fixture-attachment hole (offset) -->
    <circle cx="200" cy="140" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="200" cy="140" r="1.5" fill="#1A1A1A"/>

    <!-- Indexing teeth around outer ring -->
    <g stroke="#1A1A1A" stroke-width="0.7">
      <line x1="160" y1="60" x2="160" y2="68"/>
      <line x1="216" y1="84" x2="211" y2="89"/>
      <line x1="240" y1="140" x2="232" y2="140"/>
      <line x1="216" y1="196" x2="211" y2="191"/>
      <line x1="160" y1="220" x2="160" y2="212"/>
      <line x1="104" y1="196" x2="109" y2="191"/>
      <line x1="80" y1="140" x2="88" y2="140"/>
      <line x1="104" y1="84" x2="109" y2="89"/>
    </g>

    <!-- Centerlines -->
    <line x1="160" y1="40" x2="160" y2="240" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="60" y1="140" x2="260" y2="140" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Ø40 callout -->
    <line x1="240" y1="140" x2="310" y2="60" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrTN)"/>
    <text x="320" y="56" text-anchor="middle" fill="#E2231A" font-size="13">Ø40 mm  [Ø1.57"]</text>

    <!-- Ø9 + Ø5.5 callouts -->
    <line x1="170" y1="140" x2="270" y2="240" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrTN)"/>
    <text x="290" y="247" text-anchor="middle" fill="#E2231A" font-size="13">*Ø9 mm</text>
    <line x1="205" y1="140" x2="270" y2="280" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrTN)"/>
    <text x="290" y="287" text-anchor="middle" fill="#E2231A" font-size="13">*Ø5.5 mm</text>
  </g>

  <!-- ============================================================================
       DEVELOPED FLAT VIEW (lower-left) · drill pattern on bottom strap (unfolded)
       Shows the 4-hole pattern: Ø13 + Ø21.5 (large) + Ø13 + Ø13 with 50mm spacing
       ============================================================================ -->
  <g transform="translate(80, 540)">
    <text x="320" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">DEVELOPED FLAT · BOTTOM STRAP DRILL PATTERN</text>

    <!-- Strap (long thin rectangle representing the unfolded bottom + arms) -->
    <rect x="20" y="60" width="650" height="48" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Left + right end-cap circles (visible on the developed view) -->
    <circle cx="48" cy="84" r="22" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="48" cy="84" r="3" fill="#1A1A1A"/>
    <circle cx="642" cy="84" r="22" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    <circle cx="642" cy="84" r="3" fill="#1A1A1A"/>

    <!-- Slot in middle-left of strap -->
    <rect x="240" y="76" width="40" height="16" rx="8" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>

    <!-- 4-hole drill pattern with 50mm spacing -->
    <!-- Ø13 (left) -->
    <circle cx="320" cy="84" r="8" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="320" cy="84" r="1.5" fill="#1A1A1A"/>
    <text x="320" y="40" text-anchor="middle" fill="#E2231A" font-size="11">Ø13</text>
    <line x1="320" y1="44" x2="320" y2="76" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Ø21.5 (large center) -->
    <circle cx="370" cy="84" r="13" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="370" cy="84" r="2" fill="#1A1A1A"/>
    <text x="370" y="34" text-anchor="middle" fill="#E2231A" font-size="11">Ø21.5</text>
    <line x1="370" y1="38" x2="370" y2="71" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Ø13 (right1) -->
    <circle cx="420" cy="84" r="8" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="420" cy="84" r="1.5" fill="#1A1A1A"/>
    <text x="420" y="40" text-anchor="middle" fill="#E2231A" font-size="11">Ø13</text>
    <line x1="420" y1="44" x2="420" y2="76" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Ø13 (right2) -->
    <circle cx="470" cy="84" r="8" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="470" cy="84" r="1.5" fill="#1A1A1A"/>
    <text x="470" y="40" text-anchor="middle" fill="#E2231A" font-size="11">Ø13</text>
    <line x1="470" y1="44" x2="470" y2="76" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- 50mm spacing dimension chain -->
    <line x1="320" y1="135" x2="370" y2="135" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="345" y="152" text-anchor="middle" fill="#E2231A" font-size="11">50</text>

    <line x1="370" y1="135" x2="420" y2="135" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="395" y="152" text-anchor="middle" fill="#E2231A" font-size="11">50</text>

    <line x1="420" y1="135" x2="470" y2="135" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="445" y="152" text-anchor="middle" fill="#E2231A" font-size="11">50</text>

    <!-- Centerline -->
    <line x1="0" y1="84" x2="690" y2="84" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 725.26 mm developed length -->
    <line x1="20" y1="180" x2="670" y2="180" stroke="#E2231A" stroke-width="1" marker-start="url(#arrTN)" marker-end="url(#arrTN)"/>
    <text x="345" y="198" text-anchor="middle" fill="#E2231A" font-size="13">725.26 mm  [28.55"] · developed flat length</text>
    <line x1="20" y1="108" x2="20" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="670" y1="108" x2="670" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       ISO REFERENCE (lower-right) · 3D wireframe of FM trunnion U-bracket
       ============================================================================ -->
  <g transform="translate(800, 540)">
    <text x="180" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">ISO REFERENCE</text>

    <g stroke="#1A1A1A" stroke-width="1.4" fill="none" stroke-linejoin="round">
      <!-- U-bracket isometric: two saddle arms + bottom strap + end caps -->
      <!-- Left arm -->
      <path d="M 60 50 L 60 200 L 100 220 L 100 70 Z"/>
      <!-- Right arm -->
      <path d="M 260 30 L 260 180 L 300 200 L 300 50 Z"/>
      <!-- Bottom strap -->
      <path d="M 60 200 L 100 220 L 300 200 L 260 180 Z"/>
      <path d="M 100 220 L 300 200"/>
      <path d="M 60 200 L 260 180"/>
      <!-- Top connection (saddle U arc) -->
      <path d="M 60 50 L 100 30 L 260 30"/>
      <path d="M 60 50 L 260 30"/>

      <!-- Trunnion ear caps -->
      <ellipse cx="60" cy="125" rx="14" ry="32"/>
      <ellipse cx="100" cy="105" rx="14" ry="32"/>
      <line x1="60" y1="93" x2="100" y2="73"/>
      <line x1="60" y1="157" x2="100" y2="137"/>
      <ellipse cx="260" cy="105" rx="14" ry="32"/>
      <ellipse cx="300" cy="125" rx="14" ry="32"/>

      <!-- Bolt heads on bottom strap (4 visible from iso) -->
      <circle cx="160" cy="195" r="3" fill="#1A1A1A"/>
      <circle cx="180" cy="194" r="3" fill="#1A1A1A"/>
      <circle cx="200" cy="193" r="3" fill="#1A1A1A"/>
      <circle cx="220" cy="192" r="3" fill="#1A1A1A"/>

      <!-- Pivot indicator on trunnion ear -->
      <circle cx="100" cy="105" r="4" fill="#1A1A1A"/>
      <circle cx="260" cy="105" r="4" fill="#1A1A1A"/>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 838)">
    <text x="0" y="0" font-size="10" fill="#888">Source: Liberty FM Bracket Dimension &amp; Drilling Pattern.pdf · SNC OEM 1.020416.0180073 · SB20 chassis · 3 mm cold-rolled steel · 0.83 kg</text>
    <text x="0" y="14" font-size="10" fill="#888">All dimensions in mm with [inch] equivalent · centerlines + callouts in ⒶLG red · FM family also covers SB20 80-100W / 240-300W and SB22 150W / 300W with per-class drill geometry · refer to LSBX Liberty Install Guide</text>
  </g>
</svg>
