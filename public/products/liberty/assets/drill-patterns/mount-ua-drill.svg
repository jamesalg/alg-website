<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="13">
  <!-- =============================================================================
       Liberty /RS · Round/Square Pole Bracket Drill Pattern
       Recreated from Liberty A&D Bracket Dimension & Drilling Pattern.pdf
       (SNC OEM · part 1000200364 · ADC12 alloy · 0.5kg)
       Layout matches the source CAD: BACK view of wall flange (top-left ·
       drill pattern), FRONT-PROFILE view (top-middle · arm silhouette),
       ISO REFERENCE (top-right), TOP/PLAN view (lower-left · drill features).
       Source dimensions preserved verbatim:
         165.5  mm  arm length (front profile)
          83.9  mm  arm height (front profile)
          83.88 mm  wall flange width (back view)
         160    mm  wall flange height (back view)
        *140±0.2 mm bolt-hole vertical pitch
        *72.09±0.2 mm fixture-mount horizontal pitch
        *47.66±0.2 mm fixture-mount vertical pitch (lower row)
         3-Ø9   mm  through-hole pattern
         4-M3   mm  fixture-attachment threaded holes
         4-M8   mm  pole-side through holes
       ============================================================================= -->

  <defs>
    <marker id="arrRS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2231A"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">A&amp;D Bracket · Universal Mount</text>
  <text x="600" y="66" text-anchor="middle" font-size="12" fill="#666">Liberty  /  /UA  ·  LSBX-L1/UA  ·  ADC12 die-cast aluminum  ·  0.5 kg  ·  multi-pole compatibility · standard wall flange</text>

  <!-- ============================================================================
       BACK VIEW (upper-left) · wall-side flange seen face-on · drill pattern
       Trapezoidal flange with 3-Ø9 through holes + 2-M4 + 2-Ø4.5 fixture holes
       ============================================================================ -->
  <g transform="translate(80, 130)">
    <text x="120" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">BACK VIEW · DRILL PATTERN</text>

    <!-- Trapezoidal wall flange (rectangular with rounded corners) -->
    <rect x="40" y="20" width="160" height="240" rx="4" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Three Ø9 through-holes vertically centered on right edge -->
    <circle cx="158" cy="58" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="158" cy="58" r="1.5" fill="#1A1A1A"/>
    <circle cx="158" cy="140" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="158" cy="140" r="1.5" fill="#1A1A1A"/>
    <circle cx="158" cy="222" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="158" cy="222" r="1.5" fill="#1A1A1A"/>

    <!-- Two Ø4.5 fixture-side holes (lower) -->
    <circle cx="120" cy="200" r="3" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>
    <circle cx="120" cy="240" r="3" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>

    <!-- Two M4 deep tapped holes (upper-mid) -->
    <circle cx="80" cy="100" r="3" fill="#1A1A1A"/>
    <circle cx="80" cy="160" r="3" fill="#1A1A1A"/>

    <!-- Centerline -->
    <line x1="120" y1="0" x2="120" y2="280" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 160 mm overall flange height -->
    <line x1="-30" y1="20" x2="-30" y2="260" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="-42" y="140" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -42 140)">160 mm  [6.30"]</text>
    <line x1="-33" y1="20" x2="40" y2="20" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-33" y1="260" x2="40" y2="260" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 83.88 mm flange width -->
    <line x1="40" y1="295" x2="200" y2="295" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="120" y="312" text-anchor="middle" fill="#E2231A" font-size="13">83.88 mm  [3.30"]</text>
    <line x1="40" y1="260" x2="40" y2="298" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="200" y1="260" x2="200" y2="298" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Ø9 callout -->
    <line x1="164" y1="58" x2="240" y2="-6" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrRS)"/>
    <text x="280" y="-10" text-anchor="middle" fill="#E2231A" font-size="13">3-Ø9 mm thru</text>
  </g>

  <!-- ============================================================================
       FRONT PROFILE (upper-middle) · L-shaped arm · 165.5mm × 83.9mm
       Wall flange on left transitions to horizontal arm extending right
       ============================================================================ -->
  <g transform="translate(420, 200)">
    <text x="180" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">FRONT PROFILE</text>

    <!-- L-shaped silhouette: vertical wall flange + horizontal arm -->
    <path d="M 30 0 L 30 130 L 360 130 L 360 50 L 90 50 L 90 0 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Top edge dashed (showing arm taper from wall to fixture end) -->
    <line x1="90" y1="50" x2="360" y2="50" stroke="#1A1A1A" stroke-width="1.0" stroke-dasharray="3,2"/>

    <!-- Wall flange bolts -->
    <circle cx="60" cy="20" r="3" fill="#1A1A1A"/>
    <circle cx="60" cy="110" r="3" fill="#1A1A1A"/>

    <!-- Fixture-mount face bolts (right end) -->
    <circle cx="345" cy="65" r="3" fill="#1A1A1A"/>
    <circle cx="345" cy="115" r="3" fill="#1A1A1A"/>

    <!-- Centerline horizontal through arm -->
    <line x1="0" y1="90" x2="380" y2="90" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 165.5 mm arm length -->
    <line x1="30" y1="160" x2="360" y2="160" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="195" y="178" text-anchor="middle" fill="#E2231A" font-size="13">165.5 mm  [6.52"]</text>
    <line x1="30" y1="130" x2="30" y2="163" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="360" y1="130" x2="360" y2="163" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 83.9 mm arm height (vertical, on right) -->
    <line x1="390" y1="50" x2="390" y2="130" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="402" y="90" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 402 90)">83.9 mm  [3.30"]</text>
    <line x1="360" y1="50" x2="393" y2="50" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="360" y1="130" x2="393" y2="130" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- ============================================================================
       ISO REFERENCE (upper-right) · 3D wireframe of A&D bracket
       ============================================================================ -->
  <g transform="translate(880, 130)">
    <text x="140" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">ISO REFERENCE</text>

    <g stroke="#1A1A1A" stroke-width="1.4" fill="none" stroke-linejoin="round">
      <!-- Wall flange (vertical · left side · 3D) -->
      <path d="M 30 30 L 30 240 L 60 260 L 60 50 Z"/>
      <path d="M 30 30 L 60 50"/>
      <!-- Three through-holes on flange -->
      <circle cx="48" cy="80" r="3"/>
      <circle cx="48" cy="145" r="3"/>
      <circle cx="48" cy="210" r="3"/>

      <!-- Horizontal arm extending right (from wall flange) -->
      <path d="M 60 100 L 240 100 L 240 200 L 60 200 Z"/>
      <path d="M 60 100 L 90 80 L 270 80 L 240 100"/>
      <path d="M 240 100 L 270 80 L 270 180 L 240 200"/>

      <!-- Fixture-mount face -->
      <path d="M 240 100 L 240 200 L 270 220 L 270 120 Z"/>
      <circle cx="255" cy="135" r="3" fill="#1A1A1A"/>
      <circle cx="255" cy="180" r="3" fill="#1A1A1A"/>
    </g>
  </g>

  <!-- ============================================================================
       PLAN VIEW (lower) · top-down showing arm internal structure + bolt holes
       ============================================================================ -->
  <g transform="translate(120, 540)">
    <text x="350" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">TOP VIEW · ARM INTERNAL DETAIL</text>

    <!-- Plan rectangle of full arm -->
    <rect x="20" y="40" width="700" height="100" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Wall-flange section (left 100px) -->
    <line x1="120" y1="40" x2="120" y2="140" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="3,2"/>

    <!-- 4-M8 through-bolt pattern (visible through arm body, dashed) -->
    <circle cx="280" cy="65" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="2,2"/>
    <circle cx="280" cy="115" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="2,2"/>
    <circle cx="500" cy="65" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="2,2"/>
    <circle cx="500" cy="115" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-dasharray="2,2"/>

    <!-- 4-M3 fixture-attachment threaded holes (right end) -->
    <circle cx="650" cy="65" r="3" fill="#1A1A1A"/>
    <circle cx="650" cy="115" r="3" fill="#1A1A1A"/>
    <circle cx="700" cy="65" r="3" fill="#1A1A1A"/>
    <circle cx="700" cy="115" r="3" fill="#1A1A1A"/>

    <!-- Centerlines -->
    <line x1="0" y1="90" x2="740" y2="90" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>
    <line x1="280" y1="55" x2="280" y2="125" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="500" y1="55" x2="500" y2="125" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 72.09 mm horizontal pitch (M3 holes) -->
    <line x1="650" y1="170" x2="700" y2="170" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="675" y="188" text-anchor="middle" fill="#E2231A" font-size="11">*40.9 mm</text>
    <text x="675" y="200" text-anchor="middle" fill="#E2231A" font-size="11">[1.61"]</text>
    <line x1="650" y1="140" x2="650" y2="173" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="700" y1="140" x2="700" y2="173" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 4-M3 callout -->
    <line x1="700" y1="65" x2="780" y2="0" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrRS)"/>
    <text x="828" y="-4" text-anchor="middle" fill="#E2231A" font-size="13">*4-M3 deep 4.5</text>

    <!-- Dimension: 4-M8 thru -->
    <line x1="280" y1="65" x2="280" y2="0" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrRS)"/>
    <text x="280" y="-6" text-anchor="middle" fill="#E2231A" font-size="13">4-M8 thru</text>

    <!-- Dimension: M8 deep 18 (perpendicular to face) -->
    <text x="380" y="14" text-anchor="middle" fill="#E2231A" font-size="12">M8 deep 18 · perpendicular to fixture face</text>

    <!-- Dimension: 133 mm overall plan length (between bolt centers + edges) -->
    <line x1="120" y1="180" x2="700" y2="180" stroke="#E2231A" stroke-width="1" marker-start="url(#arrRS)" marker-end="url(#arrRS)"/>
    <text x="410" y="200" text-anchor="middle" fill="#E2231A" font-size="13">*133 mm  [5.24"] · M8-to-M3 span</text>
    <line x1="120" y1="140" x2="120" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="700" y1="140" x2="700" y2="183" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 838)">
    <text x="0" y="0" font-size="10" fill="#888">Source: Liberty A&amp;D Bracket Dimension &amp; Drilling Pattern.pdf · SNC OEM 1000200364 · ADC12 die-cast aluminum · 0.5 kg</text>
    <text x="0" y="14" font-size="10" fill="#888">All dimensions in mm with [inch] equivalent · centerlines + callouts in ⒶLG red · refer to LSBX Liberty Install Guide for fastener spec + M8 torque sequence</text>
  </g>
</svg>
