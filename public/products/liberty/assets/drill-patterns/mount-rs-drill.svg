<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="13">
  <!-- =============================================================================
       Liberty /UA · Universal Mount (Knuckle / D-Mount) Drill Pattern + Envelope
       Recreated from Liberty DM Dimension & Drilling Pattern.pdf
       (SNC OEM · part 1000203063 · ADC12 alloy · 0.44kg)
       Layout matches the source CAD: SIDE PROFILE (top-left · L-shaped arm
       silhouette + pivot disc), FLANGE DRILL PATTERN (top-right · wall
       flange face with bolt + slot pattern), END VIEW (lower-left ·
       D-mount end-on showing pivot disc), ISO REFERENCE (lower-right).
       Source dimensions preserved verbatim:
         188.6  mm  arm length (top view)
         159.6  mm  wall flange height (back view)
         140±1  mm  flange bolt-hole vertical pitch
         102    mm  bolt-hole pitch (from-pivot)
          59    mm  flange thickness segment
          45    mm  flange offset to pivot center
          17.5  mm  pivot disc diameter
          10    mm  pivot bolt diameter (Ø10)
          M8×H25 mm primary fixture-attachment thread (depth 25)
         2-Ø10.1 mm primary mounting through-holes
         2-Ø5   mm secondary mounting through-holes
         4-M4H8 mm fixture-attachment threaded holes (depth 8)
       ============================================================================= -->

  <defs>
    <marker id="arrUA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E2231A"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>

  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">DM · Round/Square Pole Bracket</text>
  <text x="600" y="66" text-anchor="middle" font-size="12" fill="#666">Liberty  /  /RS  ·  LSBX-L1/RS  ·  ADC12 die-cast aluminum  ·  0.44 kg  ·  knuckle pivot · field-rotatable on round + square poles</text>

  <!-- ============================================================================
       SIDE PROFILE (upper-left) · L-shaped arm silhouette
       Wall flange (vertical) on left transitions to angled arm with pivot disc
       on the right end where fixture attaches.
       ============================================================================ -->
  <g transform="translate(80, 130)">
    <text x="200" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">SIDE PROFILE</text>

    <!-- Side silhouette of full arm -->
    <path d="M 30 30 L 30 200 L 80 220 L 320 220 L 380 180 L 380 100 L 320 60 L 80 60 Z" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Pivot disc inset (right end · where fixture attaches) -->
    <circle cx="350" cy="140" r="40" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="350" cy="140" r="32" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>
    <circle cx="350" cy="140" r="3" fill="#1A1A1A"/>

    <!-- Indexing teeth around pivot -->
    <g stroke="#1A1A1A" stroke-width="0.6">
      <line x1="350" y1="100" x2="350" y2="106"/>
      <line x1="384" y1="116" x2="380" y2="120"/>
      <line x1="392" y1="140" x2="386" y2="140"/>
      <line x1="384" y1="164" x2="380" y2="160"/>
      <line x1="350" y1="180" x2="350" y2="174"/>
      <line x1="316" y1="164" x2="320" y2="160"/>
      <line x1="308" y1="140" x2="314" y2="140"/>
      <line x1="316" y1="116" x2="320" y2="120"/>
    </g>

    <!-- Wall-flange bolts visible on left edge -->
    <circle cx="50" cy="60" r="3" fill="#1A1A1A"/>
    <circle cx="50" cy="200" r="3" fill="#1A1A1A"/>

    <!-- Centerline horizontal -->
    <line x1="0" y1="140" x2="400" y2="140" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 188.6 mm overall length -->
    <line x1="30" y1="250" x2="380" y2="250" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="205" y="268" text-anchor="middle" fill="#E2231A" font-size="13">188.6 mm  [7.43"]</text>
    <line x1="30" y1="220" x2="30" y2="253" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="380" y1="220" x2="380" y2="253" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 159.6 mm wall flange height (vertical, on left) -->
    <line x1="-15" y1="30" x2="-15" y2="220" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="-26" y="125" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -26 125)">159.6 mm  [6.28"]</text>
    <line x1="-18" y1="30" x2="30" y2="30" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-18" y1="220" x2="30" y2="220" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- M8×25 callout on pivot -->
    <line x1="380" y1="140" x2="430" y2="80" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="450" y="74" text-anchor="middle" fill="#E2231A" font-size="13">M8×H25</text>
  </g>

  <!-- ============================================================================
       FLANGE DRILL PATTERN (upper-right) · wall flange face
       2-Ø10.1 (top) + 2-Ø5 (bottom) + Ø17.5 (mid-pivot) + Ø10 (lower)
       ============================================================================ -->
  <g transform="translate(720, 130)">
    <text x="120" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">FLANGE DRILL PATTERN</text>

    <!-- Flange face -->
    <rect x="40" y="20" width="160" height="220" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Top: 2-Ø10.1 holes -->
    <circle cx="80" cy="50" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="80" cy="50" r="1.5" fill="#1A1A1A"/>
    <circle cx="160" cy="50" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>
    <circle cx="160" cy="50" r="1.5" fill="#1A1A1A"/>

    <!-- Center Ø17.5 (large) -->
    <circle cx="120" cy="120" r="11" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="120" cy="120" r="2" fill="#1A1A1A"/>

    <!-- Center Ø10 below -->
    <circle cx="120" cy="160" r="6" fill="none" stroke="#1A1A1A" stroke-width="1.3"/>

    <!-- Bottom: 2-Ø5 holes -->
    <circle cx="80" cy="210" r="3" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>
    <circle cx="160" cy="210" r="3" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>

    <!-- Centerlines -->
    <line x1="120" y1="0" x2="120" y2="260" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 140 mm vertical bolt pitch (top to bottom) -->
    <line x1="-15" y1="50" x2="-15" y2="210" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="-26" y="130" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 -26 130)">*140±1 mm  [5.51"]</text>
    <line x1="-18" y1="50" x2="80" y2="50" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="-18" y1="210" x2="80" y2="210" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 102 mm pivot offset -->
    <line x1="240" y1="50" x2="240" y2="160" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="252" y="105" text-anchor="middle" fill="#E2231A" font-size="13" transform="rotate(-90 252 105)">102 mm  [4.02"]</text>
    <line x1="160" y1="50" x2="243" y2="50" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>
    <line x1="160" y1="160" x2="243" y2="160" stroke="#E2231A" stroke-width="0.6" stroke-dasharray="3,2"/>

    <!-- Dimension: 45 mm pivot to bottom-Ø5 -->
    <line x1="240" y1="160" x2="240" y2="210" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="252" y="190" text-anchor="middle" fill="#E2231A" font-size="11" transform="rotate(-90 252 190)">45 mm</text>

    <!-- 2-Ø10.1 callout -->
    <line x1="80" y1="44" x2="40" y2="0" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="40" y="-8" text-anchor="middle" fill="#E2231A" font-size="13">2-Ø10.1 mm</text>

    <!-- Ø17.5 callout -->
    <line x1="131" y1="120" x2="180" y2="120" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="200" y="123" font-size="13" fill="#E2231A">Ø17.5</text>

    <!-- Ø10 callout -->
    <line x1="120" y1="166" x2="60" y2="190" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="40" y="194" text-anchor="middle" fill="#E2231A" font-size="11">Ø10</text>

    <!-- 2-Ø5 callout -->
    <line x1="80" y1="216" x2="20" y2="248" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="20" y="262" text-anchor="middle" fill="#E2231A" font-size="11">2-Ø5</text>

    <!-- 59 mm flange thickness/segment label -->
    <line x1="40" y1="278" x2="80" y2="278" stroke="#E2231A" stroke-width="1" marker-start="url(#arrUA)" marker-end="url(#arrUA)"/>
    <text x="60" y="295" text-anchor="middle" fill="#E2231A" font-size="11">59 mm</text>
  </g>

  <!-- ============================================================================
       END VIEW (lower-left) · pivot disc end-on
       Shows the pivot disc with arrow + 4-M4 H8 fixture attachment threads
       ============================================================================ -->
  <g transform="translate(80, 540)">
    <text x="180" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">END VIEW · PIVOT DISC</text>

    <!-- Outer arm body silhouette (thin rectangle) -->
    <rect x="100" y="60" width="180" height="160" rx="6" fill="none" stroke="#1A1A1A" stroke-width="1.6"/>

    <!-- Pivot disc (large circle) -->
    <circle cx="190" cy="140" r="60" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>
    <circle cx="190" cy="140" r="48" fill="none" stroke="#1A1A1A" stroke-width="1.0"/>
    <circle cx="190" cy="140" r="3" fill="#1A1A1A"/>

    <!-- 4-M4 H8 fixture-attachment threads on pivot disc -->
    <circle cx="190" cy="100" r="3" fill="#1A1A1A"/>
    <circle cx="230" cy="140" r="3" fill="#1A1A1A"/>
    <circle cx="190" cy="180" r="3" fill="#1A1A1A"/>
    <circle cx="150" cy="140" r="3" fill="#1A1A1A"/>

    <!-- Direction arrow on disc (rotation indicator) -->
    <path d="M 190 100 L 200 110 L 196 110 L 196 130 M 200 110 L 196 110 M 200 110 L 200 102" stroke="#1A1A1A" stroke-width="1.4" fill="none"/>

    <!-- Indexing teeth on outer disc -->
    <g stroke="#1A1A1A" stroke-width="0.6">
      <line x1="190" y1="80" x2="190" y2="86"/>
      <line x1="232" y1="98" x2="227" y2="103"/>
      <line x1="250" y1="140" x2="244" y2="140"/>
      <line x1="232" y1="182" x2="227" y2="177"/>
      <line x1="190" y1="200" x2="190" y2="194"/>
      <line x1="148" y1="182" x2="153" y2="177"/>
      <line x1="130" y1="140" x2="136" y2="140"/>
      <line x1="148" y1="98" x2="153" y2="103"/>
    </g>

    <!-- Centerlines -->
    <line x1="190" y1="40" x2="190" y2="240" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>
    <line x1="80" y1="140" x2="300" y2="140" stroke="#E2231A" stroke-width="0.7" stroke-dasharray="6,2,1,2"/>

    <!-- Dimension: 4-M4H8 callout -->
    <line x1="230" y1="140" x2="320" y2="80" stroke="#E2231A" stroke-width="0.8" marker-end="url(#arrUA)"/>
    <text x="350" y="76" text-anchor="middle" fill="#E2231A" font-size="13">4-M4 deep 8</text>
  </g>

  <!-- ============================================================================
       ISO REFERENCE (lower-right) · 3D wireframe of universal mount + arm
       ============================================================================ -->
  <g transform="translate(680, 540)">
    <text x="200" y="-12" text-anchor="middle" font-size="11" font-weight="600" fill="#666" letter-spacing="1.4">ISO REFERENCE</text>

    <g stroke="#1A1A1A" stroke-width="1.4" fill="none" stroke-linejoin="round">
      <!-- Wall flange (vertical · left side) -->
      <path d="M 30 50 L 30 250 L 60 270 L 60 70 Z"/>
      <!-- Top + bottom holes -->
      <circle cx="48" cy="80" r="3"/>
      <circle cx="48" cy="240" r="3"/>
      <!-- Center pivot bolt visible -->
      <circle cx="48" cy="160" r="4" fill="#1A1A1A"/>

      <!-- Arm extending right-forward (knuckle bracket) -->
      <path d="M 60 70 L 240 50 L 240 250 L 60 270"/>
      <path d="M 240 50 L 270 70 L 270 230 L 240 250"/>
      <path d="M 270 70 L 270 230"/>

      <!-- Pivot disc (right end · where fixture attaches) -->
      <ellipse cx="270" cy="150" rx="14" ry="38"/>
      <circle cx="270" cy="150" r="4" fill="#1A1A1A"/>
      <ellipse cx="290" cy="148" rx="14" ry="38" stroke-dasharray="2,2"/>

      <!-- 4-M4 attachment marks on pivot -->
      <circle cx="270" cy="130" r="2" fill="#1A1A1A"/>
      <circle cx="270" cy="170" r="2" fill="#1A1A1A"/>

      <!-- Universal-mount swivel arrow indicator -->
      <path d="M 280 100 Q 320 120 320 150 Q 320 180 280 200" stroke-dasharray="3,3"/>
      <path d="M 280 200 L 273 195 M 280 200 L 273 205"/>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(60, 838)">
    <text x="0" y="0" font-size="10" fill="#888">Source: Liberty DM Dimension &amp; Drilling Pattern.pdf · SNC OEM 1000203063 · ADC12 die-cast aluminum · 0.44 kg</text>
    <text x="0" y="14" font-size="10" fill="#888">All dimensions in mm with [inch] equivalent · centerlines + callouts in ⒶLG red · refer to LSBX Liberty Install Guide for pivot torque + indexed-rotation procedure</text>
  </g>
</svg>
