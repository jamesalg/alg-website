<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <defs>
    <linearGradient id="cyberGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"  stop-color="#0a0d18" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0a0d18" stop-opacity="0"/>
      <stop offset="60%" stop-color="#1a1230" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#3a1450" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0d18" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="horizonGlow" x1="0%" y1="50%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="centerHotspot" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#ff2dd0" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ff2dd0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff2dd0" stop-opacity="0"/>
    </radialGradient>
    <style>
      .grid-line   { fill: none; stroke: #00d4ff; stroke-width: 1; opacity: 0.5; }
      .grid-radial { fill: none; stroke: #ff2dd0; stroke-width: 0.9; opacity: 0.55; }
    </style>
  </defs>

  <!-- Ambient color wash on lower half -->
  <rect width="1200" height="700" fill="url(#cyberGlow)"/>
  <rect width="1200" height="700" fill="url(#centerHotspot)"/>

  <!-- Horizon line (vanishing point reference at y=380) -->
  <line x1="0" y1="380" x2="1200" y2="380" class="grid-line" opacity="0.3"/>

  <!-- HORIZONTAL GRID LINES — receding toward horizon (perspective foreshortening) -->
  <!-- 12 lines, spacing tightens as they approach horizon -->
  <line x1="0" y1="700" x2="1200" y2="700" class="grid-line"/>
  <line x1="0" y1="660" x2="1200" y2="660" class="grid-line"/>
  <line x1="0" y1="620" x2="1200" y2="620" class="grid-line"/>
  <line x1="0" y1="580" x2="1200" y2="580" class="grid-line"/>
  <line x1="0" y1="540" x2="1200" y2="540" class="grid-line" opacity="0.45"/>
  <line x1="0" y1="505" x2="1200" y2="505" class="grid-line" opacity="0.42"/>
  <line x1="0" y1="475" x2="1200" y2="475" class="grid-line" opacity="0.38"/>
  <line x1="0" y1="450" x2="1200" y2="450" class="grid-line" opacity="0.34"/>
  <line x1="0" y1="428" x2="1200" y2="428" class="grid-line" opacity="0.30"/>
  <line x1="0" y1="410" x2="1200" y2="410" class="grid-line" opacity="0.26"/>
  <line x1="0" y1="395" x2="1200" y2="395" class="grid-line" opacity="0.22"/>
  <line x1="0" y1="385" x2="1200" y2="385" class="grid-line" opacity="0.18"/>

  <!-- RADIAL LINES — converging on vanishing point at (600, 380) -->
  <!-- Span from y=380 (vanishing) to y=700 (foreground) -->
  <line x1="600" y1="380" x2="-200" y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="-50"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="100"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="220"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="320"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="400"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="465"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="520"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="565"  y2="700" class="grid-radial" opacity="0.45"/>
  <line x1="600" y1="380" x2="600"  y2="700" class="grid-radial" opacity="0.4"/>
  <line x1="600" y1="380" x2="635"  y2="700" class="grid-radial" opacity="0.45"/>
  <line x1="600" y1="380" x2="680"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="735"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="800"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="880"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="980"  y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="1100" y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="1250" y2="700" class="grid-radial"/>
  <line x1="600" y1="380" x2="1400" y2="700" class="grid-radial"/>

  <!-- Subtle horizon teal bloom -->
  <rect x="0" y="380" width="1200" height="320" fill="url(#horizonGlow)"/>
</svg>
